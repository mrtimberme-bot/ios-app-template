name: "{{APP_NAME}}"
options:
  bundleIdPrefix: "{{BUNDLE_ID_PREFIX}}"
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: "{{TEAM_ID}}"
    CODE_SIGN_STYLE: Manual
    ENABLE_BITCODE: NO

targets:
  "{{APP_NAME}}":
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: "{{APP_NAME}}"
        excludes:
          - "**/.DS_Store"
    resources:
      - "{{APP_NAME}}/Resources/Assets.xcassets"
      - "{{APP_NAME}}/Resources/PrivacyInfo.xcprivacy"
    info:
      path: "{{APP_NAME}}/Resources/Info.plist"
      properties:
        CFBundleDisplayName: "{{APP_NAME}}"
        CFBundleIdentifier: "{{BUNDLE_ID}}"
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "{{BUNDLE_ID}}"
        INFOPLIST_FILE: "{{APP_NAME}}/Resources/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "{{APP_NAME}}/{{APP_NAME}}.entitlements"
        PROVISIONING_PROFILE_SPECIFIER: "match Development {{BUNDLE_ID}}"
      configs:
        Release:
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore {{BUNDLE_ID}}"
          SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: AppUI
      - package: CoreKit

  "{{APP_NAME}}Tests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - "{{APP_NAME}}Tests"
    dependencies:
      - target: "{{APP_NAME}}"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "{{BUNDLE_ID}}.tests"

  "{{APP_NAME}}UITests":
    type: bundle.ui-testing
    platform: iOS
    sources:
      - "{{APP_NAME}}UITests"
    dependencies:
      - target: "{{APP_NAME}}"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "{{BUNDLE_ID}}.uitests"

packages:
  AppUI:
    path: Packages/AppUI
  CoreKit:
    path: Packages/CoreKit
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
