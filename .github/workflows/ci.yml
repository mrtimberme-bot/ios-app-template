name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-template:
    name: Template check
    runs-on: ubuntu-latest
    outputs:
      is-template: ${{ steps.detect.outputs.is-template }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect template repo
        id: detect
        run: |
          if [ -d "{{APP_NAME}}" ]; then
            echo "is-template=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Dit is de template repo — lint en build overgeslagen."
          else
            echo "is-template=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: check-template
    if: needs.check-template.outputs.is-template == 'false'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: check-template
    if: needs.check-template.outputs.is-template == 'false'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -scheme "{{APP_NAME}}" \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          xcodebuild test \
            -scheme "{{APP_NAME}}" \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            | xcbeautify
